workflows:
  android-release:
    name: Android release
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - app_secrets
        - android_signing
      flutter: stable
      java: 17
    scripts:
      - name: Prepare keystore and key.properties
        script: |
          echo "$CM_KEYSTORE_B64" | base64 --decode > "$CM_BUILD_DIR/android/upload.jks"
          cat > "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$KEYSTORE_STORE_PASSWORD
          keyPassword=$KEYSTORE_KEY_PASSWORD
          keyAlias=$KEYSTORE_KEY_ALIAS
          storeFile=$CM_BUILD_DIR/android/upload.jks
          EOF
      - name: Write dart defines
        script: |
          cat > "$CM_BUILD_DIR/dart_defines.json" <<EOF
          {
            "SB_URL": "$SB_URL",
            "SB_ANON": "$SB_ANON",
            "OS_APP_ID": "$OS_APP_ID",
            "AFF_APP_ID": "$AFF_APP_ID",
            "AFF_SECRET": "$AFF_SECRET"
          }
          EOF
      - name: Flutter pub get
        script: flutter pub get
      - name: Build AAB
        script: |
          flutter build appbundle --release \
            --obfuscate --split-debug-info=build/symbols \
            --dart-define-from-file=dart_defines.json
      - name: Build APK
        script: |
          flutter build apk --release \
            --obfuscate --split-debug-info=build/symbols \
            --dart-define-from-file=dart_defines.json
    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/flutter-apk/*.apk

  ios-release:
    name: iOS release
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      groups:
        - app_secrets
        - ios_signing
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Write dart defines
        script: |
          cat > "$CM_BUILD_DIR/dart_defines.json" <<EOF
          {
            "SB_URL": "$SB_URL",
            "SB_ANON": "$SB_ANON",
            "OS_APP_ID": "$OS_APP_ID",
            "AFF_APP_ID": "$AFF_APP_ID",
            "AFF_SECRET": "$AFF_SECRET"
          }
          EOF
      - name: Flutter pub get
        script: flutter pub get
      - name: Set up provisioning
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --obfuscate --split-debug-info=build/symbols \
            --dart-define-from-file=dart_defines.json \
            --export-options-plist="$HOME/export_options.plist"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
